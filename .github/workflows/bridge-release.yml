name: Bridge release

# v0.1.0 plan: web + bridge ship from the same `vX.Y.Z` tag. GoReleaser
# attaches the six bridge binaries to that GitHub Release; the web is
# continuously deployed from `main` and doesn't need its own tag attachment.
# The earlier `bridge-v*` scheme broke semver parsing in OSS GoReleaser
# (the `bridge-` prefix needs the Pro-only `monorepo.tag_prefix` config).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: bridge/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: bridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
