name: Deploy web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'dsp/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Requires the following repository secrets to be configured before this
# workflow can succeed:
#   CLOUDFLARE_API_TOKEN  — token with "Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
# The Pages project name below must match the project created in Cloudflare.

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsp -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install web dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Build web (prebuild hook runs wasm-pack)
        run: pnpm -C web build

      # Check whether the Pages project exists; create only if missing.
      # Cleaner than wrangler-action + continue-on-error which leaves a red
      # "Action failed" annotation on every successful run after the first.
      - name: Ensure Cloudflare Pages project exists
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/moshon-sdr")
          case "$status" in
            200)
              echo "Pages project 'moshon-sdr' already exists."
              ;;
            404)
              echo "Creating Pages project 'moshon-sdr'..."
              curl -sSf -X POST \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"name":"moshon-sdr","production_branch":"main"}' \
                "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects" \
                > /dev/null
              echo "Created."
              ;;
            *)
              echo "Unexpected HTTP $status from Cloudflare API while probing project."
              exit 1
              ;;
          esac

      # Pass --commit-message explicitly with an ASCII-only string. Wrangler's
      # auto-detected git message can contain Unicode (e.g. → in commit bodies)
      # which Cloudflare's deployments API rejects with code 8000111.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy web/dist
            --project-name=moshon-sdr
            --commit-dirty=true
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-message=Deploy_${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
