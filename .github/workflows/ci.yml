name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (build + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Type-check
        run: pnpm -C web check

      - name: Build
        run: pnpm -C web build

  dsp:
    name: DSP (cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsp -> target

      - name: cargo fmt --check
        run: cargo -C dsp fmt -- --check

      - name: cargo clippy
        run: cargo -C dsp clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo -C dsp test

      - name: cargo build --target wasm32-unknown-unknown
        run: cargo -C dsp build --release --target wasm32-unknown-unknown

  bridge:
    name: Bridge (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: bridge/go.sum

      - name: go vet
        working-directory: bridge
        run: go vet ./...

      - name: go build
        working-directory: bridge
        run: go build ./...

      - name: go test
        working-directory: bridge
        run: go test ./...
