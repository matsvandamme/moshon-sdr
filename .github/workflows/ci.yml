name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (build + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # web build prebuild hook runs wasm-pack on dsp/, which needs Rust.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsp -> target

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Build (prebuild hook compiles WASM)
        run: pnpm -C web build

      - name: Type-check
        run: pnpm -C web check

  dsp:
    name: DSP (cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dsp -> target

      - name: cargo fmt --check
        working-directory: dsp
        run: cargo fmt -- --check

      - name: cargo clippy
        working-directory: dsp
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: dsp
        run: cargo test

      - name: cargo build --target wasm32-unknown-unknown
        working-directory: dsp
        run: cargo build --release --target wasm32-unknown-unknown

  bridge:
    name: Bridge (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          # cache-dependency-path omitted: bridge/ has no external deps yet
          # so there's no go.sum. Re-add this once we add a websocket lib.

      - name: go vet
        working-directory: bridge
        run: go vet ./...

      - name: go build
        working-directory: bridge
        run: go build ./...

      - name: go test
        working-directory: bridge
        run: go test ./...
